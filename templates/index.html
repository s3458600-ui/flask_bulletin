<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Happy Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- 상단 바 -->
    <nav class="navbar navbar-light toss-nav">
        <div class="container">
            <span class="navbar-brand fw-bold text-primary" id="go-home">Happy Board</span>
            <div id="nav-auth"></div>
        </div>
    </nav>

    <div class="container my-5 max-width-container">
        
        <!-- [1] 리스트 페이지 -->
        <div id="page-list" class="toss-box">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">게시글 리스트</h3>
                <button class="btn btn-primary d-none" id="go-write">글쓰기</button>
            </div>
            <table class="table toss-table">
                <thead>
                    <tr>
                        <th style="width: 15%">번호</th>
                        <th style="width: 45%">제목</th>
                        <th style="width: 20%">작성자</th>
                        <th style="width: 20%">날짜</th>
                    </tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>

        <!-- [2] 본문 상세 보기 페이지 -->
        <div id="page-detail" class="toss-box d-none">
            <h2 class="fw-bold mb-2" id="view-title"></h2>
            <p class="text-muted small mb-4" id="view-author"></p>
            <div class="fs-5 mb-5" id="view-content" style="white-space: pre-wrap;"></div>
            <div class="d-flex justify-content-between">
                <button class="btn btn-light" id="detail-close">목록으로</button>
                <div id="owner-buttons" class="d-none">
                    <button class="btn btn-light text-secondary me-2" id="go-edit">수정하기</button>
                    <button class="btn btn-danger" id="action-delete">삭제</button>
                </div>
            </div>
        </div>

        <!-- [3] 작성 및 수정 페이지 -->
        <div id="page-form" class="toss-box d-none">
            <h3 class="fw-bold mb-4" id="form-mode-title">글 작성</h3>
            <input type="hidden" id="form-id">
            <div class="mb-3">
                <input type="text" class="form-control toss-input" id="form-title-input" placeholder="제목">
            </div>
            <div class="mb-4">
                <textarea class="form-control toss-input" id="form-content-input" rows="8" placeholder="내용을 입력하세요."></textarea>
            </div>
            <div class="d-flex justify-content-end">
                <button class="btn btn-light me-2" id="form-cancel">취소</button>
                <button class="btn btn-primary" id="action-save">저장</button>
            </div>
        </div>

    </div>

    <!-- 간소화된 회원가입/로그인 팝업 -->
    <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content toss-box p-4 border-0">
                <div id="auth-login-view">
                    <h4 class="fw-bold mb-3">로그인</h4>
                    <input type="text" class="form-control toss-input mb-2" id="in-username" placeholder="아이디">
                    <input type="password" class="form-control toss-input mb-3" id="in-password" placeholder="비밀번호">
                    <button class="btn btn-primary w-100 mb-2" id="action-login">로그인</button>
                    <small class="text-muted">계정이 없으신가요? <a href="#" id="switch-join">회원가입</a></small>
                </div>
                <div id="auth-join-view" class="d-none">
                    <h4 class="fw-bold mb-3">회원가입</h4>
                    <input type="text" class="form-control toss-input mb-2" id="join-username" placeholder="사용할 아이디">
                    <input type="password" class="form-control toss-input mb-2" id="join-password" placeholder="비밀번호">
                    <input type="text" class="form-control toss-input mb-3" id="join-name" placeholder="이름">
                    <button class="btn btn-primary w-100 mb-2" id="action-join">가입하기</button>
                    <small class="text-muted">이미 계정이 있나요? <a href="#" id="switch-login">로그인</a></small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
